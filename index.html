<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clon de Whatsapp</title>
    <link rel="stylesheet" href="./styles/main.css">

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>
<section class="app">
    <aside>
        <div class="profile">
            <img src="https://placehold.co/100x100/red/black" alt="foto de perfil">
            <h2>Tomás Pereyra</h2>
        </div>
        <div class="actions">
        </div>
        <button><svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M11.5 8C14 8 16 10 16 12.5S14 17 11.5 17S7 15 7 12.5S9 8 11.5 8m0 1A3.5 3.5 0 0 0 8 12.5a3.5 3.5 0 0 0 3.5 3.5a3.5 3.5 0 0 0 3.5-3.5A3.5 3.5 0 0 0 11.5 9M5 5h2l2-2h5l2 2h2a3 3 0 0 1 3 3v9a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3m4.41-1l-2 2H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h13a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-2.41l-2-2z" />
            </svg></button>
        <button><svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M5 3h13a3 3 0 0 1 3 3v13a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3m0 1a2 2 0 0 0-2 2v11.59l4.29-4.3l2.5 2.5l5-5L20 16V6a2 2 0 0 0-2-2zm4.79 13.21l-2.5-2.5L3 19a2 2 0 0 0 2 2h13a2 2 0 0 0 2-2v-1.59l-5.21-5.2zM7.5 6A2.5 2.5 0 0 1 10 8.5A2.5 2.5 0 0 1 7.5 11A2.5 2.5 0 0 1 5 8.5A2.5 2.5 0 0 1 7.5 6m0 1A1.5 1.5 0 0 0 6 8.5A1.5 1.5 0 0 0 7.5 10A1.5 1.5 0 0 0 9 8.5A1.5 1.5 0 0 0 7.5 7" />
            </svg></button>
        <button><svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M19.9 12.66a1 1 0 0 1 0-1.32l1.28-1.44a1 1 0 0 0 .12-1.17l-2-3.46a1 1 0 0 0-1.07-.48l-1.88.38a1 1 0 0 1-1.15-.66l-.61-1.83a1 1 0 0 0-.95-.68h-4a1 1 0 0 0-1 .68l-.56 1.83a1 1 0 0 1-1.15.66L5 4.79a1 1 0 0 0-1 .48L2 8.73a1 1 0 0 0 .1 1.17l1.27 1.44a1 1 0 0 1 0 1.32L2.1 14.1a1 1 0 0 0-.1 1.17l2 3.46a1 1 0 0 0 1.07.48l1.88-.38a1 1 0 0 1 1.15.66l.61 1.83a1 1 0 0 0 1 .68h4a1 1 0 0 0 .95-.68l.61-1.83a1 1 0 0 1 1.15-.66l1.88.38a1 1 0 0 0 1.07-.48l2-3.46a1 1 0 0 0-.12-1.17ZM18.41 14l.8.9l-1.28 2.22l-1.18-.24a3 3 0 0 0-3.45 2L12.92 20h-2.56L10 18.86a3 3 0 0 0-3.45-2l-1.18.24l-1.3-2.21l.8-.9a3 3 0 0 0 0-4l-.8-.9l1.28-2.2l1.18.24a3 3 0 0 0 3.45-2L10.36 4h2.56l.38 1.14a3 3 0 0 0 3.45 2l1.18-.24l1.28 2.22l-.8.9a3 3 0 0 0 0 3.98m-6.77-6a4 4 0 1 0 4 4a4 4 0 0 0-4-4m0 6a2 2 0 1 1 2-2a2 2 0 0 1-2 2" />
            </svg></button>
        <form>
            <input type="search" placeholder="Buscar un chat o iniciar uno nuevo">
        </form>
        <section class="chats">
            <ul>
                <li class="user-chat">
                    <img src="https://placehold.co/100x100" alt="foto de perfil">
                    <div>
                        <h3>María López</h3>
                        <p>Nos vemos a las 18?</p>
                    </div>
                </li>
                <li class="user-chat">
                    <img src="https://placehold.co/100x100" alt="foto de perfil">
                    <div>
                        <h3>Grupo: Proyecto</h3>
                        <p>Push a main - revisión</p>
                    </div>
                </li>
                <li class="user-chat">
                    <img src="https://placehold.co/100x100" alt="foto de perfil">
                    <div>
                        <h3>Soporte</h3>
                        <p>Tu factura está lista</p>
                    </div>
                </li>
            </ul>
        </section>
    </aside>
    <div class="chat-panel">
        <header class="chat-header">
            <img src="https://placehold.co/100x100" alt="foto de perfil">
            <div>
                <h3>María López</h3>
                <p>en línea</p>
            </div>
        </header>
        <section class="messages">
            <div class="message">
                <p>Hola, querés venir por un café?</p>
                <p>14:12</p>
            </div>
            <div class="message">
                <p>Si, perfecto. A las 18 te viene bien?</p>
                <p>14:13</p>
            </div>
            <div class="message">
                <p>Dale dale, en la plaza entonces 😊</p>
                <p>14:14</p>
            </div>
        </section>
        <footer>
            <button id="btn-attach" class="attach">
                <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24">
                    <path fill="none" stroke="currentColor" stroke-linecap="square" stroke-width="2"
                        d="m20.506 12.313l-7.778 7.778a6 6 0 0 1-8.485-8.485l7.778-7.778a4 4 0 1 1 5.657 5.657L9.9 17.263a2 2 0 1 1-2.829-2.829l7.071-7.07" />
                </svg>
            </button>
            <form>
                <textarea type="text" placeholder="Escribe un mensaje"></textarea>
            </form>
            <button class="send">
                <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24">
                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="1.5" d="M22 12L3 20l3.563-8L3 4zM6.5 12H22" />
                </svg>
            </button>
        </footer>
    </div>
</section>
<body>

</body>

</html>
